name: Testes Agendados - Diário

on:
  schedule:
    # Executa todos os dias às 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # Permite execução manual

jobs:
  scheduled-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes completos
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          headless: true
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}

      - name: Upload de evidências
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-evidencias-agendadas
          path: |
            cypress/evidencias/screenshots/
            cypress/evidencias/videos/
          retention-days: 14

      - name: Notificar em caso de falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Testes agendados falharam',
              body: 'Os testes agendados do Cypress falharam. Verifique os artifacts para mais detalhes.'
            })