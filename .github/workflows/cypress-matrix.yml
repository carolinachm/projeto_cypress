name: Testes Multi-Plataforma

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-matrix:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chrome]
        spec: [
          'cypress/e2e/elements/*.cy.js',
          'cypress/e2e/alertframeswindows/*.cy.js',
          'cypress/e2e/forms/*.cy.js'
        ]
        exclude:
          - os: windows-latest
            browser: electron
          - os: macos-latest
            browser: chrome

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          
      - name: Instalar dependências
        run: npm ci
        
      - name: Executar testes
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ matrix.browser }}
          spec: ${{ matrix.spec }}
          
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.os }}-${{ matrix.browser }}
          path: cypress/evidencias/